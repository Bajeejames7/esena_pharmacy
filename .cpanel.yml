---
deployment:
  tasks:
    # Set deployment path
    - export DEPLOYPATH=/home/ohnokmqf/public_html/
    
    # Copy pre-built frontend files to public_html root
    - /bin/cp -R frontend/build/* $DEPLOYPATH
    
    # Create api directory and copy backend files
    - /bin/mkdir -p $DEPLOYPATH/api
    - /bin/cp -R backend/* $DEPLOYPATH/api/
    
    # Set proper permissions
    - /bin/chmod -R 755 $DEPLOYPATH