<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Icon Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 12px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-purple-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">Cookie Icon Test</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Original Settings Gear Icon -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-lg font-semibold mb-4">Original Settings Gear</h2>
                <div class="flex justify-center">
                    <div class="glass-card p-3 hover:scale-105 transition-all duration-300 group cursor-pointer">
                        <svg 
                            class="w-6 h-6 text-gray-600 group-hover:text-blue-500 transition-colors duration-200" 
                            fill="none" 
                            stroke="currentColor" 
                            viewBox="0 0 24 24"
                        >
                            <path 
                                stroke-linecap="round" 
                                stroke-linejoin="round" 
                                stroke-width="2" 
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" 
                            />
                            <path 
                                stroke-linecap="round" 
                                stroke-linejoin="round" 
                                stroke-width="2" 
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" 
                            />
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Cookie Image PNG -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-lg font-semibold mb-4">Cookie Image PNG</h2>
                <div class="flex justify-center">
                    <div class="glass-card p-3 hover:scale-105 transition-all duration-300 group cursor-pointer">
                        <img 
                            src="/cookie_image.png" 
                            alt="Cookie Settings" 
                            class="w-6 h-6 group-hover:scale-110 transition-all duration-200"
                        />
                    </div>
                </div>
            </div>

            <!-- Dark Theme Preview -->
            <div class="bg-gray-800 p-6 rounded-lg shadow-md">
                <h2 class="text-lg font-semibold mb-4 text-white">Dark Theme</h2>
                <div class="flex justify-center">
                    <div class="glass-card p-3 hover:scale-105 transition-all duration-300 group cursor-pointer" style="background: rgba(0, 0, 0, 0.25); border-color: rgba(255, 255, 255, 0.1);">
                        <img 
                            src="/cookie_image.png" 
                            alt="Cookie Settings" 
                            class="w-6 h-6 group-hover:scale-110 transition-all duration-200"
                        />
                    </div>
                </div>
            </div>
        </div>

        <!-- Size Variations -->
        <div class="mt-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Size Variations</h2>
            <div class="flex items-center justify-center space-x-8 bg-white p-8 rounded-lg shadow-md">
                <!-- Small -->
                <div class="text-center">
                    <div class="glass-card p-2 mb-2 inline-block">
                        <img 
                            src="/cookie_image.png" 
                            alt="Cookie" 
                            class="w-4 h-4"
                        />
                    </div>
                    <p class="text-sm text-gray-600">Small (16px)</p>
                </div>

                <!-- Medium -->
                <div class="text-center">
                    <div class="glass-card p-3 mb-2 inline-block">
                        <img 
                            src="/cookie_image.png" 
                            alt="Cookie" 
                            class="w-6 h-6"
                        />
                    </div>
                    <p class="text-sm text-gray-600">Medium (24px)</p>
                </div>

                <!-- Large -->
                <div class="text-center">
                    <div class="glass-card p-4 mb-2 inline-block">
                        <img 
                            src="/cookie_image.png" 
                            alt="Cookie" 
                            class="w-8 h-8"
                        />
                    </div>
                    <p class="text-sm text-gray-600">Large (32px)</p>
                </div>
            </div>
        </div>

        <!-- Positioned Example -->
        <div class="mt-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Positioned Example</h2>
            <div class="relative bg-gradient-to-br from-purple-100 to-blue-100 h-64 rounded-lg overflow-hidden">
                <p class="absolute top-4 left-4 text-gray-600">Cookie settings button positioned in bottom-left corner</p>
                
                <!-- Cookie Settings Button -->
                <div class="absolute left-4 bottom-4">
                    <div class="glass-card p-3 hover:scale-105 transition-all duration-300 group cursor-pointer">
                        <img 
                            src="/cookie_image.png" 
                            alt="Cookie Settings" 
                            class="w-6 h-6 group-hover:scale-110 transition-all duration-200"
                        />
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Add click handlers
        document.querySelectorAll('.cursor-pointer').forEach(button => {
            button.addEventListener('click', function() {
                alert('Cookie settings clicked!');
            });
        });
    </script>
</body>
</html>
